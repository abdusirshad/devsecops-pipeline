# Sample input that SATISFIES every policy gate (used for `make policy`).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliant-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliant-api
  template:
    metadata:
      labels:
        app: compliant-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: api
          image: ghcr.io/abdusirshad/devsecops-sample-api:1.0.0
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 250m
              memory: 128Mi
