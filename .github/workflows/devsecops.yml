name: devsecops

# Reference DevSecOps pipeline.
# - All scan/lint/test gates run on every push and PR using free/OSS actions,
#   so the workflow stays green on a public fork with no secrets configured.
# - Image build/push + keyless cosign signing run ONLY on push to main
#   (the `release` job is guarded by an `if:` on ref + event), so PRs and
#   forks skip the steps that need OIDC / registry write.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default token; jobs widen scope explicitly when needed.
permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devsecops-sample-api
  PYTHON_VERSION: "3.13"

jobs:
  # --------------------------------------------------------------------------
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        working-directory: app
        run: ruff check .

      - name: Pytest
        run: pytest -q

  # --------------------------------------------------------------------------
  secrets-scan:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No license needed for OSS scanning of public repos.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # --------------------------------------------------------------------------
  sast:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.97.0
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        # Public OSS rulesets, report-only (audit) mode: findings are printed for
        # review but do not fail the build, since this repo intentionally ships
        # insecure sample manifests as OPA negative-test fixtures. Hard gates are
        # the unit tests, Gitleaks, Hadolint and the OPA/Conftest policy job.
        run: semgrep scan --config p/ci --config p/python --config p/security-audit --metrics=off

  # --------------------------------------------------------------------------
  dockerfile-lint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

  # --------------------------------------------------------------------------
  fs-scan:
    name: Trivy (filesystem + config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem (vuln + secret)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy config (IaC misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"

  # --------------------------------------------------------------------------
  iac-scan:
    name: Checkov (IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile
          quiet: true
          # Report-only: the repo intentionally includes insecure demo manifests
          # (OPA negative-test fixtures + illustrative IaC). Findings are printed;
          # enforcement is handled by the OPA/Conftest policy job.
          soft_fail: true

  # --------------------------------------------------------------------------
  policy:
    name: Conftest / OPA (policy-as-code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -fsSL -o conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf conftest.tar.gz conftest
          sudo install conftest /usr/local/bin/conftest
      - name: Verify policy unit tests
        run: conftest verify --policy policy
      - name: Enforce policy on k8s manifests
        run: conftest test k8s/deployment.yaml policy/conftest/inputs/deployment-pass.yaml --policy policy

  # --------------------------------------------------------------------------
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: ./app
          format: spdx-json
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # Build + sign + push. Runs ONLY on push to main (not on PRs/forks), where
  # OIDC and GHCR write are available. Keyless cosign signing uses the GitHub
  # OIDC token (id-token: write) with no long-lived keys.
  release:
    name: Build, Scan, Sign & Push image
    runs-on: ubuntu-latest
    needs: [lint-test, secrets-scan, sast, dockerfile-lint, fs-scan, iac-scan, policy, sbom]
    # On-demand only (Actions tab -> Run workflow). Keeps the push/PR badge green
    # and deterministic; run this manually to build, scan, sign (keyless cosign)
    # and push the image to GHCR when you want to publish a release artifact.
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write       # push to GHCR
      id-token: write        # keyless cosign signing via OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Keyless sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
