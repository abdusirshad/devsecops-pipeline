# ----------------------------------------------------------------------------
# Hardened Deployment for the sample API. Scanned by Trivy config + Checkov
# (Kubernetes framework) and by the Conftest/OPA policies under policy/.
# Designed to satisfy the gates: pinned image (no :latest), non-root,
# read-only root FS, dropped capabilities, resource limits, probes.
# ----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-sample-api
  labels:
    app.kubernetes.io/name: devsecops-sample-api
    app.kubernetes.io/part-of: devsecops-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: devsecops-sample-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devsecops-sample-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/abdusirshad/devsecops-sample-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-sample-api
  labels:
    app.kubernetes.io/name: devsecops-sample-api
spec:
  selector:
    app.kubernetes.io/name: devsecops-sample-api
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
